<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>MIVV — Vault Search</title>

  <!-- PWA manifest -->
  <link rel="manifest" href="/manifest.json">

  <!-- Theme colour (browser chrome on Android) -->
  <meta name="theme-color" content="#0050b3">

  <!-- iOS PWA -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="MIVV">
  <link rel="apple-touch-icon" href="/icons/icon-180.png">
  <link rel="apple-touch-icon" sizes="152x152" href="/icons/icon-152.png">
  <link rel="apple-touch-icon" sizes="167x167" href="/icons/icon-167.png">
  <link rel="apple-touch-icon" sizes="180x180" href="/icons/icon-180.png">

  <!-- Splash screen colours for iOS -->
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

  <!-- Favicon -->
  <link rel="icon" type="image/png" sizes="192x192" href="/icons/icon-192.png">
  <link rel="icon" type="image/png" sizes="512x512" href="/icons/icon-512.png">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:ital,wght@0,600;0,700;0,800;0,900;1,800;1,900&family=Barlow:wght@400;500;600&family=Josefin+Slab:wght@700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #f4f4ef;
      --surface: #ffffff;
      --surface2: #ebebE5;
      --border: rgba(0,0,0,0.18);
      --border-strong: rgba(0,0,0,0.55);
      --sega-blue: #0050b3;
      --sega-blue-dark: #003d8a;
      --sega-red: #cc1122;
      --sega-red-hover: #aa0e1c;
      --sega-red-glow: rgba(204,17,34,0.18);
      --text: #0a0e1a;
      --text-muted: #556;
      --green: #16a34a;
      --yellow: #b45309;
      --red: #dc2626;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    /* iOS safe area support */
    :root {
      --sat: env(safe-area-inset-top);
      --sar: env(safe-area-inset-right);
      --sab: env(safe-area-inset-bottom);
      --sal: env(safe-area-inset-left);
    }

    body {
      background-color: var(--bg);
      background-image:
        linear-gradient(rgba(0,0,0,0.10) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,0,0,0.10) 1px, transparent 1px);
      background-size: 22px 22px;
      color: var(--text);
      font-family: 'Barlow', 'Segoe UI', system-ui, sans-serif;
      min-height: 100vh;
    }

    /* ── Header ── */
    header {
      background: #fff;
      border-bottom: 4px solid var(--sega-red);
      padding: 0.7rem 2rem;
      padding-top: calc(0.7rem + env(safe-area-inset-top));
      padding-left: calc(2rem + env(safe-area-inset-left));
      padding-right: calc(2rem + env(safe-area-inset-right));
      display: flex;
      align-items: center;
      justify-content: center;
      position: sticky;
      top: 0;
      z-index: 50;
      box-shadow: 0 2px 12px rgba(0,0,0,0.12);
    }

    /* SEGA-style logo */
    .logo {
      display: inline-flex;
      flex-direction: column;
      align-items: center;
      line-height: 1;
      cursor: pointer;
      user-select: none;
      transition: opacity 0.15s;
      gap: 0.1rem;
    }

    .logo:hover { opacity: 0.8; }

    .logo-mivv {
      display: block;
      height: 70px;
      width: auto;
    }

    .logo-vault {
      font-family: 'Josefin Slab', serif;
      font-weight: 700;
      font-style: normal;
      font-size: 1.1rem;
      color: var(--sega-red);
      letter-spacing: -0.02em;
      line-height: 1;
    }

    /* ── Toast ── */
    .toast {
      position: fixed;
      bottom: 1.5rem;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: #111;
      color: #fff;
      border-radius: 100px;
      padding: 0.6rem 1.4rem;
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: 0.06em;
      z-index: 200;
      transition: transform 0.25s ease, opacity 0.25s ease;
      opacity: 0;
      pointer-events: none;
      white-space: nowrap;
      box-shadow: 0 4px 20px rgba(0,0,0,0.3);
    }

    .toast.show {
      transform: translateX(-50%) translateY(0);
      opacity: 1;
    }

    /* ── Search section ── */
    .search-section {
      padding: 2rem;
      max-width: 960px;
      margin: 0 auto;
    }

    .search-label {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 0.72rem;
      font-weight: 800;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 0.5rem;
    }

    .search-row {
      display: flex;
      gap: 0.5rem;
      align-items: stretch;
    }

    .search-input {
      flex: 1;
      background: var(--surface);
      border: 2px solid var(--border-strong);
      border-radius: 2px;
      padding: 0.7rem 1rem;
      color: var(--text);
      font-family: 'Barlow', sans-serif;
      font-size: 1rem;
      outline: none;
      transition: border-color 0.15s, box-shadow 0.15s;
    }

    .search-input:focus {
      border-color: var(--sega-blue);
      box-shadow: 0 0 0 3px rgba(0,80,179,0.15);
    }

    .search-input::placeholder { color: #aab; }

    .system-select {
      background: var(--surface);
      border: 2px solid var(--border-strong);
      border-radius: 2px;
      padding: 0.7rem 0.9rem;
      color: var(--text);
      font-family: 'Barlow', sans-serif;
      font-size: 0.9rem;
      outline: none;
      cursor: pointer;
      min-width: 180px;
      transition: border-color 0.15s;
    }

    .system-select:focus { border-color: var(--sega-blue); }

    .search-btn {
      background: var(--sega-red);
      border: 2px solid var(--sega-red);
      border-radius: 2px;
      padding: 0.7rem 1.75rem;
      color: white;
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 1.1rem;
      font-weight: 800;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
      white-space: nowrap;
    }

    .search-btn:hover { background: var(--sega-red-hover); border-color: var(--sega-red-hover); }
    .search-btn:active { transform: scale(0.97); }

    .search-hint {
      margin-top: 0.45rem;
      font-size: 0.76rem;
      color: var(--text-muted);
    }

    /* ── Status bar ── */
    .status-bar {
      max-width: 960px;
      margin: 0 auto;
      padding: 0 2rem 1rem;
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 0.85rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-muted);
      min-height: 1.5rem;
    }

    /* ── Results grid ── */
    .results {
      max-width: 960px;
      margin: 0 auto;
      padding: 0 2rem calc(4rem + var(--sab));
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(158px, 1fr));
      gap: 1.1rem;
    }

    /* ── Game card — styled like a mini SMS box ── */
    .card {
      background: var(--surface);
      border: 2px solid rgba(0,0,0,0.55);
      border-radius: 3px;
      overflow: hidden;
      cursor: pointer;
      transition: transform 0.15s, box-shadow 0.15s;
      position: relative;
      background: var(--surface);
    }

    .card:hover {
      transform: translateY(-4px);
      box-shadow: 0 10px 28px rgba(0,0,0,0.22);
    }

    .card-art-wrap {
      width: 100%;
      height: 172px;
      background: transparent;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .card-art {
      max-width: 100%;
      max-height: 100%;
      width: auto;
      height: auto;
      object-fit: contain;
      display: block;
    }

    .card-art.no-art {
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 0.68rem;
      font-weight: 800;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #aab;
      width: 100%;
      height: 100%;
    }

    .card-body {
      padding: 0.5rem 0.6rem 0.55rem;
      background: var(--surface);
      border-top: 2px solid rgba(0,0,0,0.55);
    }

    .card-title {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 0.9rem;
      font-weight: 800;
      line-height: 1.2;
      letter-spacing: 0.02em;
      text-transform: uppercase;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
      color: var(--text);
      margin-bottom: 0.3rem;
    }

    .card-meta {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .card-system {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 0.65rem;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--text-muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 76%;
    }

    .card-rating {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 0.95rem;
      font-weight: 900;
    }

    .rating-high { color: var(--green); }
    .rating-mid  { color: var(--yellow); }
    .rating-low  { color: var(--red); }

    /* ── Spinner ── */
    .spinner {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 4rem;
      grid-column: 1 / -1;
    }

    .spinner-ring {
      width: 40px;
      height: 40px;
      border: 3px solid rgba(0,0,0,0.12);
      border-top-color: var(--sega-red);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Empty state ── */
    .empty {
      grid-column: 1 / -1;
      text-align: center;
      padding: 4rem 2rem;
      color: var(--text-muted);
    }

    .empty-icon { font-size: 3rem; margin-bottom: 1rem; }

    .empty h3 {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 1.3rem;
      font-weight: 800;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      margin-bottom: 0.5rem;
      color: var(--text);
    }

    .sonic-box {
      display: inline-block;
      border: 3px solid rgba(0,0,0,0.55);
      border-radius: 3px;
      overflow: hidden;
      background: var(--surface);
      box-shadow: 4px 4px 0 rgba(0,0,0,0.18);
      margin-bottom: 1.25rem;
    }

    .sonic-box img {
      display: block;
      width: 220px;
      height: auto;
    }

    @media (max-width: 600px) {
      .sonic-box img { width: 170px; }
    }

    /* ── Modal ── */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(10,14,26,0.6);
      backdrop-filter: blur(3px);
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s;
    }

    .modal-overlay.open { opacity: 1; pointer-events: all; }

    .modal {
      background: var(--surface);
      border: 2px solid rgba(0,0,0,0.6);
      border-top: none;
      border-radius: 3px;
      width: 100%;
      max-width: 700px;
      max-height: 90vh;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      overscroll-behavior: contain;
      transform: translateY(16px);
      transition: transform 0.2s;
      box-shadow: 0 24px 60px rgba(0,0,0,0.3);
    }

    .modal-overlay.open .modal { transform: translateY(0); }

    /* Blue stripe at top of modal like SMS box header */
    .modal-stripe {
      height: 14px;
      background: var(--sega-blue);
      border-bottom: 4px solid var(--sega-red);
      flex-shrink: 0;
    }

    .modal-header {
      display: flex;
      align-items: flex-start;
      gap: 1.25rem;
      padding: 1.25rem 1.5rem;
      border-bottom: 2px solid rgba(0,0,0,0.2);
      background: rgba(255,255,255,0.7);
    }

    .modal-boxart {
      width: 120px;
      min-width: 120px;
      border-radius: 2px;
      border: 2px solid rgba(0,0,0,0.4);
      background: var(--surface2);
    }

    .modal-boxart.no-art {
      height: 160px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 3rem;
    }

    .modal-info { flex: 1; }

    .modal-title {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 1.6rem;
      font-weight: 900;
      letter-spacing: 0.02em;
      text-transform: uppercase;
      line-height: 1.1;
      color: var(--text);
      margin-bottom: 0.4rem;
    }

    .modal-system {
      display: inline-block;
      background: var(--sega-blue);
      color: #fff;
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 0.72rem;
      font-weight: 800;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      padding: 0.15rem 0.55rem;
      border-radius: 2px;
      margin-bottom: 0.7rem;
    }

    .modal-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 0.35rem;
      margin-bottom: 0.7rem;
    }

    .tag {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 0.78rem;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      background: var(--surface2);
      border: 1.5px solid rgba(0,0,0,0.25);
      border-radius: 2px;
      padding: 0.12rem 0.45rem;
      color: var(--text-muted);
    }

    .modal-ratings { display: flex; gap: 1rem; }

    .modal-rating-item { text-align: center; }

    .modal-rating-label {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 0.62rem;
      font-weight: 800;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text-muted);
    }

    .modal-rating-value {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 1.2rem;
      font-weight: 900;
    }

    .modal-body { padding: 1.25rem 1.5rem calc(1.5rem + var(--sab)); }

    .modal-screenshots {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 0.65rem;
      margin-bottom: 1.25rem;
    }

    .screenshot {
      border-radius: 2px;
      border: 2px solid rgba(0,0,0,0.3);
      width: 100%;
      display: block;
      background: #111;
      image-rendering: pixelated;
    }

    .modal-actions { display: flex; gap: 0.5rem; }

    .btn-primary {
      background: var(--sega-red);
      color: white;
      border: 2px solid var(--sega-red);
      border-radius: 2px;
      padding: 0.7rem 1.5rem;
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 1rem;
      font-weight: 800;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      cursor: pointer;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      transition: background 0.15s;
    }

    .btn-primary:hover { background: var(--sega-red-hover); border-color: var(--sega-red-hover); }

    .btn-secondary {
      background: transparent;
      color: var(--text);
      border: 2px solid rgba(0,0,0,0.4);
      border-radius: 2px;
      padding: 0.7rem 1.1rem;
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
    }

    .btn-secondary:hover { border-color: var(--sega-blue); background: rgba(0,80,179,0.06); }

    .modal-loading {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 3rem;
    }

    /* ── Scrollbar ── */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.25); border-radius: 3px; }

    /* ── Responsive ── */
    @media (max-width: 600px) {
      header {
        padding: 0.55rem 1rem;
        padding-top: calc(0.55rem + env(safe-area-inset-top));
        padding-left: calc(1rem + env(safe-area-inset-left));
        padding-right: calc(1rem + env(safe-area-inset-right));
      }
      .search-section { padding: 1rem; }
      .search-row { flex-wrap: wrap; }
      .search-input { font-size: 16px; }
      .system-select { min-width: unset; width: auto; font-size: 16px; order: 2; flex-basis: 100%; margin: 0 auto; }
      .search-btn { width: 100%; order: 3; }
      .status-bar { padding: 0 1rem 0.5rem; }
      .results { padding: 0 1rem 3rem; gap: 0.75rem; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); }
      .card-art-wrap { height: 145px; }

      .modal-overlay { padding: 0; align-items: flex-end; }
      .modal {
        border-radius: 3px 3px 0 0;
        max-height: 92vh;
        max-width: 100%;
        transform: translateY(40px);
      }
      .modal-overlay.open .modal { transform: translateY(0); }
      .modal-header { flex-direction: column; padding: 1rem; gap: 1rem; align-items: center; text-align: center; }
      .modal-boxart { width: 180px; min-width: unset; }
      .modal-system { display: inline-block; }
      .modal-tags { justify-content: center; }
      .modal-ratings { justify-content: center; }
      .modal-body { padding: 1rem; }
      .modal-screenshots { grid-template-columns: 1fr 1fr; gap: 0.5rem; }
      .modal-actions { flex-wrap: wrap; }
      .modal-actions .btn-primary,
      .modal-actions .btn-secondary { flex: 1; justify-content: center; text-align: center; }
    }
  </style>
</head>
<body>

<header>
  <div class="logo" id="homeLogo">
    <img class="logo-mivv" src="/mivv-logo.png" alt="MIVV">
    <span class="logo-vault">Vault Search</span>
  </div>
</header>

<div class="toast" id="toast"></div>

<div class="search-section">
  <div class="search-row">
    <input
      type="text"
      id="searchInput"
      class="search-input"
      placeholder="🔍"
      autocomplete="off"
      spellcheck="false"
    >
    <select id="systemSelect" class="system-select">
      <option value="0">All Systems</option>
    </select>
    <button id="searchBtn" class="search-btn">Search</button>
  </div>
</div>

<div class="status-bar" id="statusBar"></div>

<div class="results" id="results">
  <div class="empty">
    <div class="sonic-box">
      <img src="/sonic.png" alt="Sonic">
    </div>
    <p><strong>Enter a game title to get started</strong></p>
  </div>
</div>

<!-- Modal -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal" id="modal">
    <div class="modal-stripe"></div>
    <div id="modalContent"></div>
  </div>
</div>

<script>
const searchInput = document.getElementById('searchInput');
const systemSelect = document.getElementById('systemSelect');
const searchBtn = document.getElementById('searchBtn');
const resultsEl = document.getElementById('results');
const statusBar = document.getElementById('statusBar');
const modalOverlay = document.getElementById('modalOverlay');
const modalContent = document.getElementById('modalContent');
const toast = document.getElementById('toast');

// ── Toast ──
let toastTimer;
function showToast(msg, duration = 3000) {
  toast.textContent = msg;
  toast.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => toast.classList.remove('show'), duration);
}

// ── Home ──
function goHome() {
  closeModal();
  searchInput.value = '';
  statusBar.textContent = '';
  resultsEl.innerHTML = `
    <div class="empty">
      <div class="sonic-box">
        <img src="/sonic.png" alt="Sonic">
      </div>
      <p><strong>Enter a game title to get started</strong></p>
    </div>`;
  searchInput.focus();
}

document.getElementById('homeLogo').addEventListener('click', goHome);

// Load systems
async function loadSystems() {
  try {
    const res = await fetch('/api/systems');
    const systems = await res.json();
    const groups = {};
    systems.forEach(s => {
      if (!groups[s.group]) groups[s.group] = [];
      groups[s.group].push(s);
    });
    Object.entries(groups).forEach(([group, list]) => {
      const optgroup = document.createElement('optgroup');
      optgroup.label = group;
      list.forEach(s => {
        const opt = document.createElement('option');
        opt.value = s.code;
        opt.textContent = s.name;
        optgroup.appendChild(opt);
      });
      systemSelect.appendChild(optgroup);
    });
  } catch (e) {
    console.error('Failed to load systems:', e);
  }
}

// Search
async function doSearch() {
  const q = searchInput.value.trim();
  if (q.length < 2) {
    statusBar.textContent = 'Enter at least 2 characters';
    return;
  }
  const system = systemSelect.value;
  searchBtn.disabled = true;
  searchBtn.textContent = 'Searching…';
  statusBar.textContent = '';
  resultsEl.innerHTML = '<div class="spinner"><div class="spinner-ring"></div></div>';

  try {
    const params = new URLSearchParams({ q, system });
    const res = await fetch(`/api/search?${params}`);
    const games = await res.json();
    if (games.error) throw new Error(games.error);
    renderResults(games, q);
    statusBar.textContent = games.length === 0
      ? 'No results found'
      : `${games.length} result${games.length !== 1 ? 's' : ''} found`;
  } catch (err) {
    resultsEl.innerHTML = `<div class="empty"><div class="empty-icon">⚠️</div><h3>Search failed</h3><p>${err.message}</p></div>`;
    statusBar.textContent = '';
  } finally {
    searchBtn.disabled = false;
    searchBtn.textContent = 'Search';
  }
}

function ratingClass(r) {
  const n = parseFloat(r);
  if (isNaN(n)) return '';
  if (n >= 8) return 'rating-high';
  if (n >= 6) return 'rating-mid';
  return 'rating-low';
}

function renderResults(games, query) {
  if (games.length === 0) {
    resultsEl.innerHTML = `
      <div class="empty">
        <div class="empty-icon">🔍</div>
        <h3>No results for "${escHtml(query)}"</h3>
        <p>Try a different title or system</p>
      </div>`;
    return;
  }

  resultsEl.innerHTML = games.map(g => `
    <div class="card" data-id="${g.id}" data-system="${escHtml(g.systemName)}">
      <div class="card-art-wrap">
        <img
          class="card-art"
          src="/api/image?v=2&id=${g.id}"
          alt=""
          loading="lazy"
          onerror="this.parentElement.innerHTML='<div class=\\'card-art no-art\\'>No Boxart</div>'"
        >
      </div>
      <div class="card-body">
        <div class="card-title">${escHtml(g.title)}</div>
        <div class="card-meta">
          <span class="card-system">${escHtml(g.systemName)}</span>
          ${g.rating ? `<span class="card-rating ${ratingClass(g.rating)}">${g.rating}</span>` : ''}
        </div>
      </div>
    </div>
  `).join('');

  resultsEl.querySelectorAll('.card').forEach(card => {
    card.addEventListener('click', () => openModal(card.dataset.id));
  });
}

// Modal
async function openModal(id) {
  modalContent.innerHTML = '<div class="modal-loading"><div class="spinner-ring"></div></div>';
  modalOverlay.classList.add('open');
  document.body.style.overflow = 'hidden';

  try {
    const res = await fetch(`/api/game/${id}`);
    const game = await res.json();
    if (game.error) throw new Error(game.error);
    renderModal(game);
  } catch (err) {
    modalContent.innerHTML = `<div style="padding:2rem;text-align:center;color:var(--text-muted)">${err.message}</div>`;
  }
}

function renderModal(game) {
  const tags = [
    game.year && `<span class="tag">${escHtml(game.year)}</span>`,
    game.players && `<span class="tag">${escHtml(game.players)} player${game.players !== '1' ? 's' : ''}</span>`,
    game.fileSize && `<span class="tag">${escHtml(game.fileSize)}</span>`,
    game.version && `<span class="tag">v${escHtml(game.version)}</span>`,
  ].filter(Boolean).join('');

  const ratings = Object.entries(game.ratings || {}).map(([label, val]) => `
    <div class="modal-rating-item">
      <div class="modal-rating-label">${escHtml(label)}</div>
      <div class="modal-rating-value ${ratingClass(val)}">${escHtml(val)}</div>
    </div>
  `).join('');

  const screenshotImgs = [game.screenshotTitle, game.screenshotSnap]
    .filter(Boolean)
    .map(src => `
      <img class="screenshot" src="${escHtml(src)}" alt="Screenshot" loading="lazy"
        onerror="this.parentElement && this.parentElement.removeChild(this)">
    `).join('');

  modalContent.innerHTML = `
    <div class="modal-header">
      <img class="modal-boxart" src="/api/image?type=box&id=${game.id}" alt="Box art"
        onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
      <div class="modal-boxart no-art" style="display:none">🎮</div>
      <div class="modal-info">
        <div class="modal-title">${escHtml(game.title)}</div>
        <div class="modal-system">${escHtml(game.systemName || game.systemCode)}</div>
        ${tags ? `<div class="modal-tags">${tags}</div>` : ''}
        ${ratings ? `<div class="modal-ratings">${ratings}</div>` : ''}
      </div>
    </div>
    <div class="modal-body">
      ${screenshotImgs ? `<div class="modal-screenshots">${screenshotImgs}</div>` : ''}
      <div class="modal-actions">
        ${game.mediaId ? `<button class="btn-primary" id="downloadBtn" data-media-id="${escHtml(game.mediaId)}">⬇ Download</button>` : ''}
        <a class="btn-secondary" href="${escHtml(game.vaultUrl)}" target="_blank" rel="noopener">View on Vimm</a>
        <button class="btn-secondary" id="closeModalBtn">Close</button>
      </div>
    </div>
  `;

  document.getElementById('closeModalBtn').addEventListener('click', closeModal);

  const dlBtn = document.getElementById('downloadBtn');
  if (dlBtn) {
    dlBtn.addEventListener('click', () => {
      const mediaId = dlBtn.dataset.mediaId;
      dlBtn.textContent = '⏳ Starting…';
      dlBtn.disabled = true;
      const a = document.createElement('a');
      a.href = `/api/download?mediaId=${mediaId}`;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      showToast('⬇ Download started');
      setTimeout(() => {
        dlBtn.innerHTML = '✓ Downloading';
        dlBtn.style.background = 'var(--green)';
        dlBtn.style.borderColor = 'var(--green)';
      }, 1000);
    });
  }
}

function closeModal() {
  modalOverlay.classList.remove('open');
  document.body.style.overflow = '';
}

modalOverlay.addEventListener('click', (e) => {
  if (e.target === modalOverlay) closeModal();
});

document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') closeModal();
  if (e.key === 'Enter' && document.activeElement === searchInput) doSearch();
});

searchBtn.addEventListener('click', doSearch);

let debounceTimer;
searchInput.addEventListener('input', () => {
  clearTimeout(debounceTimer);
  if (searchInput.value.trim().length < 2) return;
  debounceTimer = setTimeout(doSearch, 400);
});

systemSelect.addEventListener('change', () => {
  if (searchInput.value.trim().length >= 2) doSearch();
});

function escHtml(str) {
  if (!str) return '';
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

loadSystems();

// ── Service Worker ──
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('/sw.js').catch(err => {
      console.warn('SW registration failed:', err);
    });
  });
}
</script>
</body>
</html>
